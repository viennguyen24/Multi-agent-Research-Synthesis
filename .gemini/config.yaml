have_fun: false

memory_config:
  disabled: false

ignore_patterns:
  - "**/venv/**"
  - "**/.venv/**"
  - "**/.pytest_cache/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/.env"

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 20

  pull_request_opened:
    summary: true
    code_review: true
    include_drafts: false
    help: true